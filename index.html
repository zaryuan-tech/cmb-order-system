        :root {
            --primary: #2C5F7D;
            --primary-dark: #1A3A4D;
            --accent: #E8956C;
            --accent-light: #F4C4A8;
            --bg-light: #F8F9FA;
            --bg-white: #FFFFFF;
            --text-dark: #1F2937;
            --text-gray: #6B7280;
            --border: #E5E7EB;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --shadow: rgba(0, 0, 0, 0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, var(--bg-light) 0%, #E8EEF1 100%);
            color: var(--text-dark);
            line-height: 1.6;
            min-height: 100vh;
            padding-bottom: 100px;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 30px 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px var(--shadow);
            border-radius: 0 0 30px 30px;
            animation: slideDown 0.6s ease-out;
        }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        h1 { font-family: 'Playfair Display', serif; font-size: 2.2em; font-weight: 700; text-align: center; margin-bottom: 8px; letter-spacing: 1px; }
        .subtitle { text-align: center; font-size: 1em; opacity: 0.95; font-weight: 300; }
        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }
        .nav-btn {
            padding: 10px 25px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            border-radius: 10px;
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .nav-btn:hover { background: white; color: var(--primary); }
        .nav-btn.active { background: white; color: var(--primary); }
        .main-grid { display: grid; grid-template-columns: 1fr 400px; gap: 25px; }
        .product-section, .cart-section {
            background: var(--bg-white);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px var(--shadow);
            animation: fadeInUp 0.7s ease-out;
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.6em;
            color: var(--primary);
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 3px solid var(--accent);
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; color: var(--text-dark); font-size: 1.05em; }
        label .note {
            display: block;
            font-size: 0.85em;
            color: var(--text-gray);
            font-weight: 400;
            margin-top: 4px;
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 1em;
            font-family: 'Noto Sans TC', sans-serif;
            transition: all 0.3s ease;
            background: var(--bg-light);
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(44, 95, 125, 0.1);
        }
        .category-tabs { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
        .category-tab {
            padding: 8px 16px;
            background: var(--bg-light);
            border: 2px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            font-size: 0.9em;
        }
        .category-tab:hover { background: var(--accent-light); border-color: var(--accent); transform: translateY(-2px); }
        .category-tab.active { background: var(--primary); color: white; border-color: var(--primary); }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 15px;
            max-height: 600px;
            overflow-y: auto;
            padding: 10px;
            background: var(--bg-light);
            border-radius: 12px;
        }
        .product-grid::-webkit-scrollbar { width: 8px; }
        .product-grid::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
        .product-card {
            background: white;
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }
        .product-card:hover { border-color: var(--primary); box-shadow: 0 4px 15px var(--shadow); transform: translateY(-2px); }
        .product-card.biomed { border-color: #1f78b4; background: #f1f8ff; }
        .product-card.biomed::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 6px;
            background: #1f78b4;
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
        }
        .company-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 999px;
            font-size: 12px;
            margin: 8px 0 6px 0;
            font-weight: 600;
            border: 1px solid transparent;
            width: fit-content;
        }
        .company-badge.biomed { background: #e6f2ff; color: #0b4f7a; border-color: #b7dcff; }
        .product-name { font-weight: 600; color: var(--text-dark); margin-bottom: 4px; font-size: 1em; }
        .product-spec { color: var(--text-gray); font-size: 0.85em; margin-bottom: 6px; }
        .product-price { color: var(--accent); font-weight: 700; font-size: 1.1em; }
        .discount-badge {
            display: inline-block;
            background: linear-gradient(135deg, #EF4444 0%, #DC2626 100%);
            color: white;
            padding: 2px 6px;
            border-radius: 12px;
            font-size: 0.65em;
            font-weight: 700;
            margin-top: 4px;
        }
        .discount-badge.sendon { background: linear-gradient(135deg, var(--warning) 0%, #D97706 100%); }
        .final-price { color: var(--success); font-size: 0.8em; margin-top: 3px; font-weight: 600; }
        .cart-section { position: sticky; top: 20px; max-height: calc(100vh - 40px); overflow-y: auto; }
        .cart-empty { text-align: center; padding: 40px 20px; color: var(--text-gray); }
        .cart-items { margin-bottom: 20px; max-height: 400px; overflow-y: auto; }
        .cart-item { background: var(--bg-light); border-radius: 10px; padding: 12px; margin-bottom: 10px; position: relative; }
        .cart-item.biomed { border-left: 6px solid #1f78b4; background: rgba(31, 120, 180, 0.06); }
        .cart-item-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 8px; }
        .cart-item-name { font-weight: 600; color: var(--text-dark); flex: 1; font-size: 0.95em; }
        .cart-item-remove {
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s ease;
            margin-left: 8px;
        }
        .cart-item-remove:hover { transform: scale(1.1); background: #DC2626; }
        .cart-item-details { font-size: 0.85em; color: var(--text-gray); margin-bottom: 6px; }
        .cart-item-quantity { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
        .qty-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s ease;
        }
        .qty-btn:hover { background: var(--primary-dark); transform: scale(1.05); }
        .qty-display { min-width: 40px; text-align: center; font-weight: 600; }
        .cart-item-price { text-align: right; font-weight: 700; color: var(--success); font-size: 1.05em; margin-top: 6px; }
        .cart-summary { border-top: 2px solid var(--border); padding-top: 15px; margin-top: 15px; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.95em; }
        .summary-row.total {
            font-size: 1.3em;
            font-weight: 700;
            color: var(--primary);
            margin-top: 10px;
            padding-top: 10px;
            border-top: 2px solid var(--border);
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Noto Sans TC', sans-serif;
            margin-top: 10px;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(44, 95, 125, 0.3);
        }
        .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(44, 95, 125, 0.4); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { background: #DC2626; transform: translateY(-2px); }
        .loading { display: none; text-align: center; padding: 15px; color: var(--text-gray); }
        .loading.active { display: block; }
        .spinner {
            border: 3px solid var(--border);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 35px;
            height: 35px;
            animation: spin 1s linear infinite;
            margin: 0 auto 8px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .alert {
            background: linear-gradient(135deg, #D1FAE5 0%, #A7F3D0 100%);
            border-left: 4px solid var(--success);
            padding: 15px;
            margin-top: 15px;
            border-radius: 10px;
            display: none;
            animation: slideIn 0.5s ease;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        .alert.active { display: block; }
        .alert.error { background: linear-gradient(135deg, #FEE2E2 0%, #FECACA 100%); border-left-color: var(--danger); }
        .alert h4 { margin-bottom: 6px; font-size: 1.05em; }
        .required { color: var(--danger); }
        .company-badge-inline {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 12px;
            margin-left: 8px;
            vertical-align: middle;
            border: 1px solid #e5e7eb;
            background: #f3f4f6;
            color: #111827;
        }
        .company-badge-inline.biomed { border-color: #b7dcff; background: #e8f4ff; color: #005a9c; }
        @media (max-width: 1024px) {
            .main-grid { grid-template-columns: 1fr; }
            .cart-section { position: relative; top: 0; max-height: none; }
            .product-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
        }
    </style>
</head>

            return product.price * quantity;

                    finalPriceHTML = `<div class="final-price">優惠價：NT$ ${finalPrice}</div>`;
                }

                const companyBadgeHTML = product.company === '中美生醫'
                    ? '<div class="company-badge biomed">中美生醫</div>'
                    : '';

                card.innerHTML = `
                    <div class="product-name">${product.name}</div>
                    ${companyBadgeHTML}
                    <div class="product-spec">${product.spec}</div>
                    <div class="product-price">原價：NT$ ${product.price}</div>
                    ${finalPriceHTML}
                    ${discountBadgeHTML}
                `;

                card.addEventListener('click', () => addToCart(product));
                grid.appendChild(card);
            });
        }

        function addToCart(product) {
            const existingItem = cart.find(item =>
                item.name === product.name && 
                item.spec === product.spec && 
                item.company === product.company
            );

            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }

            renderCart();
            showAlert('✓ 已加入購物車', false);
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            renderCart();
        }

        function updateQuantity(index, delta) {
            cart[index].quantity += delta;
            if (cart[index].quantity <= 0) {
                removeFromCart(index);
            } else {
                renderCart();
            }
        }

        function renderCart() {
            const cartContent = document.getElementById('cartContent');

            if (cart.length === 0) {
                cartContent.innerHTML = `
                    <div class="cart-empty">
                        <p>🛒 購物車是空的</p>
                        <p style="font-size: 0.9em; margin-top: 8px;">點擊左側產品加入購物車</p>
                    </div>
                `;
                return;
            }

            let totalOriginal = 0;
            let totalFinal = 0;

            const itemsHTML = cart.map((item, index) => {
                const itemTotal = calculateFinalPrice(item, item.quantity);
                const itemOriginal = item.price * item.quantity;
                totalOriginal += itemOriginal;
                totalFinal += itemTotal;

                const discountText = item.discount === 'buy1get1' ? '買一送一' : 
                                    (item.discount === 'sendon70' ? '仙同7折' : '');

                const companyBadge = item.company === '中美生醫' 
                    ? '<span class="company-badge-inline biomed">中美生醫</span>' 
                    : '';

                return `
                    <div class="cart-item ${item.company === '中美生醫' ? 'biomed' : ''}">
                        <div class="cart-item-header">
                            <div class="cart-item-name">${item.name}${companyBadge}</div>
                            <button class="cart-item-remove" onclick="removeFromCart(${index})">×</button>
                        </div>
                        <div class="cart-item-details">${item.spec}${discountText ? ' | ' + discountText : ''}</div>
                        <div class="cart-item-details">單價：NT$ ${item.price}</div>
                        <div class="cart-item-quantity">
                            <button class="qty-btn" onclick="updateQuantity(${index}, -1)">-</button>
                            <span class="qty-display">${item.quantity}</span>
                            <button class="qty-btn" onclick="updateQuantity(${index}, 1)">+</button>
                        </div>
                        <div class="cart-item-price">小計：NT$ ${itemTotal}</div>
                    </div>
                `;
            }).join('');

            const discount = totalOriginal - totalFinal;

            cartContent.innerHTML = `
                <div class="cart-items">${itemsHTML}</div>
                <div class="cart-summary">
                    <div class="summary-row">
                        <span>商品原價：</span>
                        <span>NT$ ${totalOriginal}</span>
                    </div>
                    <div class="summary-row" style="color: var(--danger);">
                        <span>優惠折扣：</span>
                        <span>- NT$ ${discount}</span>
                    </div>
                    <div class="summary-row total">
                        <span>實付總額：</span>
                        <span>NT$ ${totalFinal}</span>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="submitOrder()" id="submitBtn">
                    ✓ 提交訂單 (共 ${cart.length} 項)
                </button>
                <button class="btn btn-danger" onclick="clearCart()">
                    🗑️ 清空購物車
                </button>
            `;
        }

        function clearCart() {
            if (confirm('確定要清空購物車嗎？')) {
                cart = [];
                renderCart();
            }
        }

        async function submitOrder() {
            const employeeName = document.getElementById('employeeName').value.trim();

            if (!employeeName) {
                showAlert('❌ 請輸入訂購人姓名', true);
                document.getElementById('employeeName').focus();
                return;
            }

            if (cart.length === 0) {
                showAlert('❌ 購物車是空的，請先選擇產品', true);
                return;
            }

            document.getElementById('loading').classList.add('active');
            const submitBtn = document.getElementById('submitBtn');
            if (submitBtn) submitBtn.disabled = true;

            try {
                for (const item of cart) {
                    const finalTotal = calculateFinalPrice(item, item.quantity);
                    const discountType = item.discount === 'buy1get1' ? '買一送一' :
                                        (item.discount === 'sendon70' ? '仙同7折' : '');

                    const orderData = {
                        productName: item.name,
                        spec: item.spec,
                        unitPrice: item.price,
                        quantity: item.quantity,
                        total: finalTotal,
                        note: discountType,
                        orderer: employeeName,
                        company: item.company
                    };

                    try {
                        await fetch(SCRIPT_URL, {
                            redirect: 'follow',
                            method: 'POST',
                            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                            body: new URLSearchParams({ data: JSON.stringify(orderData) })
                        });
                    } catch (err) {
                        console.log('提交產品:', item.name);
                    }

                    await new Promise(resolve => setTimeout(resolve, 800));
                }

                const totalItems = cart.length;
                const totalAmount = cart.reduce((sum, item) => sum + calculateFinalPrice(item, item.quantity), 0);

                showAlert(`✅ 訂單提交成功！\n\n共 ${totalItems} 項產品\n總金額：NT$ ${totalAmount}\n\n請到 Google Sheet 確認訂單`, false);

                cart = [];
                renderCart();
                document.getElementById('employeeName').value = '';

            } catch (error) {
                console.error('提交錯誤：', error);
                showAlert('⚠️ 訂單已提交，請到 Google Sheet 確認', false);
            } finally {
                document.getElementById('loading').classList.remove('active');
                if (submitBtn) submitBtn.disabled = false;
            }
        }

        function showAlert(message, isError) {
            const alertBox = document.getElementById('alertBox');
            alertBox.textContent = message;
            alertBox.className = 'alert active' + (isError ? ' error' : '');
            setTimeout(() => alertBox.classList.remove('active'), 6000);
        }
    </script>
</body>
</html>
