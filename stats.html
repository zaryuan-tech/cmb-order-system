<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中美生醫訂單統計</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2C5F7D;
            --primary-dark: #1A3A4D;
            --accent: #E8956C;
            --accent-light: #F4C4A8;
            --bg-light: #F8F9FA;
            --bg-white: #FFFFFF;
            --text-dark: #1F2937;
            --text-gray: #6B7280;
            --border: #E5E7EB;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --shadow: rgba(0, 0, 0, 0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, var(--bg-light) 0%, #E8EEF1 100%);
            color: var(--text-dark);
            line-height: 1.6;
            min-height: 100vh;
            padding-bottom: 50px;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 30px 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px var(--shadow);
            border-radius: 0 0 30px 30px;
        }
        h1 { font-family: 'Playfair Display', serif; font-size: 2.2em; font-weight: 700; text-align: center; margin-bottom: 8px; }
        .subtitle { text-align: center; font-size: 1em; opacity: 0.95; font-weight: 300; }
        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }
        .nav-btn {
            padding: 10px 25px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            border-radius: 10px;
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .nav-btn:hover { background: white; color: var(--primary); }
        .nav-btn.active { background: white; color: var(--primary); }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--bg-white);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 40px var(--shadow);
            text-align: center;
        }
        .stat-icon { font-size: 2.5em; margin-bottom: 10px; }
        .stat-value { font-size: 2em; font-weight: 700; color: var(--primary); margin-bottom: 5px; }
        .stat-label { color: var(--text-gray); font-size: 0.95em; }
        .section {
            background: var(--bg-white);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px var(--shadow);
            margin-bottom: 25px;
        }
        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.6em;
            color: var(--primary);
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 3px solid var(--accent);
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-gray);
        }
        .spinner {
            border: 3px solid var(--border);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th {
            background: var(--primary);
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: 600;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }
        tr:hover { background: var(--bg-light); }
        .company-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: 600;
            border: 1px solid;
        }
        .company-badge.biomed { background: #e6f2ff; color: #0b4f7a; border-color: #b7dcff; }
        .company-badge.cmb { background: #f0f9ff; color: #1e40af; border-color: #bfdbfe; }
        .error-message {
            background: linear-gradient(135deg, #FEE2E2 0%, #FECACA 100%);
            border-left: 4px solid var(--danger);
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
        .refresh-btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }
        .refresh-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(44, 95, 125, 0.4); }
        .filter-section {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-input {
            padding: 10px 15px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 1em;
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--bg-light);
            flex: 1;
            min-width: 200px;
        }
        .filter-input:focus { outline: none; border-color: var(--primary); background: white; }
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: 1fr; }
            table { font-size: 0.9em; }
            th, td { padding: 8px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>📊 中美生醫訂單統計</h1>
            <p class="subtitle">即時訂單數據分析</p>
            <div class="nav-buttons">
                <a href="index.html" class="nav-btn">🛒 返回訂購</a>
                <a href="stats.html" class="nav-btn active">📊 統計報表</a>
            </div>
        </div>
    </header>

    <div class="container">
        <!-- 統計卡片 -->
        <div class="stats-grid" id="statsCards">
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div class="stat-value" id="totalOrders">-</div>
                <div class="stat-label">總訂單數</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📦</div>
                <div class="stat-value" id="totalItems">-</div>
                <div class="stat-label">總商品數量</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💰</div>
                <div class="stat-value" id="totalAmount">-</div>
                <div class="stat-label">總金額 (NT$)</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🏢</div>
                <div class="stat-value" id="totalOrderers">-</div>
                <div class="stat-label">訂購人數</div>
            </div>
        </div>

        <!-- 訂購者列表 -->
        <div class="section">
            <h2 class="section-title">👥 訂購者統計</h2>
            <button class="refresh-btn" onclick="loadData()">🔄 重新整理資料</button>
            <div class="filter-section">
                <input type="text" class="filter-input" id="ordererFilter" placeholder="🔍 搜尋訂購者姓名...">
            </div>
            <div id="ordererStats"></div>
        </div>

        <!-- 產品統計 -->
        <div class="section">
            <h2 class="section-title">📦 產品銷售統計</h2>
            <div class="filter-section">
                <input type="text" class="filter-input" id="productFilter" placeholder="🔍 搜尋產品名稱...">
            </div>
            <div id="productStats"></div>
        </div>

        <!-- 載入中 -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>正在載入統計資料...</p>
        </div>

        <!-- 錯誤訊息 -->
        <div id="errorMessage" style="display: none;"></div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxM050Qq3lYlch874tC6_F0Pr3U7sNxLiJvUTSIM0-nMy7xAODHLCrodArgfDvOyTog/exec';
        
        let allOrders = [];

        // 頁面載入時自動取得資料
        document.addEventListener('DOMContentLoaded', function() {
            loadData();
            setupFilters();
        });

        // 設定搜尋過濾
        function setupFilters() {
            document.getElementById('ordererFilter').addEventListener('input', function(e) {
                renderOrdererStats(e.target.value.toLowerCase());
            });

            document.getElementById('productFilter').addEventListener('input', function(e) {
                renderProductStats(e.target.value.toLowerCase());
            });
        }

        // 載入資料
        async function loadData() {
            const loading = document.getElementById('loading');
            const errorMessage = document.getElementById('errorMessage');
            
            loading.style.display = 'block';
            errorMessage.style.display = 'none';

            try {
                const response = await fetch(`${SCRIPT_URL}?action=getOrders`);
                const data = await response.json();

                if (data.ok && data.orders) {
                    allOrders = data.orders;
                    updateStats();
                    renderOrdererStats();
                    renderProductStats();
                } else {
                    throw new Error(data.error || '無法取得資料');
                }

            } catch (error) {
                console.error('載入錯誤：', error);
                errorMessage.innerHTML = `
                    <div class="error-message">
                        <h4>⚠️ 無法載入資料</h4>
                        <p>${error.message}</p>
                        <p style="margin-top: 10px; font-size: 0.9em;">請確認：</p>
                        <ul style="margin-left: 20px; margin-top: 5px;">
                            <li>Google Apps Script 已正確部署</li>
                            <li>網路連線正常</li>
                            <li>Web App URL 正確</li>
                        </ul>
                    </div>
                `;
                errorMessage.style.display = 'block';
            } finally {
                loading.style.display = 'none';
            }
        }

        // 更新統計卡片
        function updateStats() {
            const totalOrders = allOrders.length;
            const totalItems = allOrders.reduce((sum, order) => sum + Number(order.quantity || 0), 0);
            const totalAmount = allOrders.reduce((sum, order) => sum + Number(order.totalPrice || 0), 0);
            const uniqueOrderers = new Set(allOrders.map(o => o.orderer).filter(Boolean)).size;

            document.getElementById('totalOrders').textContent = totalOrders.toLocaleString();
            document.getElementById('totalItems').textContent = totalItems.toLocaleString();
            document.getElementById('totalAmount').textContent = totalAmount.toLocaleString();
            document.getElementById('totalOrderers').textContent = uniqueOrderers.toLocaleString();
        }

        // 渲染訂購者統計
        function renderOrdererStats(filterText = '') {
            const ordererMap = {};

            allOrders.forEach(order => {
                const orderer = order.orderer || '未知';
                if (!ordererMap[orderer]) {
                    ordererMap[orderer] = {
                        count: 0,
                        totalAmount: 0,
                        items: []
                    };
                }
                ordererMap[orderer].count += Number(order.quantity || 0);
                ordererMap[orderer].totalAmount += Number(order.totalPrice || 0);
                ordererMap[orderer].items.push(order);
            });

            let ordererArray = Object.entries(ordererMap).map(([name, data]) => ({
                name,
                ...data
            }));

            // 過濾
            if (filterText) {
                ordererArray = ordererArray.filter(o => o.name.toLowerCase().includes(filterText));
            }

            // 排序：依總金額降序
            ordererArray.sort((a, b) => b.totalAmount - a.totalAmount);

            const html = `
                <table>
                    <thead>
                        <tr>
                            <th>訂購者</th>
                            <th>訂購項目數</th>
                            <th>商品總數量</th>
                            <th>總金額 (NT$)</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${ordererArray.map(o => `
                            <tr>
                                <td><strong>${o.name}</strong></td>
                                <td>${o.items.length} 項</td>
                                <td>${o.count} 個</td>
                                <td style="color: var(--success); font-weight: 600;">NT$ ${o.totalAmount.toLocaleString()}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;

            document.getElementById('ordererStats').innerHTML = html;
        }

        // 渲染產品統計
        function renderProductStats(filterText = '') {
            const productMap = {};

            allOrders.forEach(order => {
                const key = `${order.productName}|${order.spec}|${order.company}`;
                if (!productMap[key]) {
                    productMap[key] = {
                        productName: order.productName,
                        spec: order.spec,
                        company: order.company,
                        unitPrice: order.unitPrice,
                        totalQuantity: 0,
                        totalAmount: 0,
                        orderCount: 0
                    };
                }
                productMap[key].totalQuantity += Number(order.quantity || 0);
                productMap[key].totalAmount += Number(order.totalPrice || 0);
                productMap[key].orderCount += 1;
            });

            let productArray = Object.values(productMap);

            // 過濾
            if (filterText) {
                productArray = productArray.filter(p => 
                    p.productName.toLowerCase().includes(filterText) ||
                    p.spec.toLowerCase().includes(filterText)
                );
            }

            // 排序：依總數量降序
            productArray.sort((a, b) => b.totalQuantity - a.totalQuantity);

            const html = `
                <table>
                    <thead>
                        <tr>
                            <th>產品名稱</th>
                            <th>規格</th>
                            <th>公司別</th>
                            <th>單價</th>
                            <th>總銷量</th>
                            <th>訂單數</th>
                            <th>銷售金額</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${productArray.map(p => {
                            const companyBadge = p.company === '中美生醫' 
                                ? '<span class="company-badge biomed">中美生醫</span>'
                                : '<span class="company-badge cmb">中美製藥</span>';
                            return `
                                <tr>
                                    <td><strong>${p.productName}</strong></td>
                                    <td>${p.spec}</td>
                                    <td>${companyBadge}</td>
                                    <td>NT$ ${Number(p.unitPrice).toLocaleString()}</td>
                                    <td style="font-weight: 600;">${p.totalQuantity} 個</td>
                                    <td>${p.orderCount} 筆</td>
                                    <td style="color: var(--success); font-weight: 600;">NT$ ${p.totalAmount.toLocaleString()}</td>
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            `;

            document.getElementById('productStats').innerHTML = html;
        }
    </script>
</body>
</html>
